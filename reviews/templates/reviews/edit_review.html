{% extends "base.html" %}

{% block title %}Edit Review{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Your Review</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary mt-3">
            Update Review
        </button>

        <a href="{% url 'products:product_detail' review.product.id %}" class="btn btn-secondary mt-3">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
