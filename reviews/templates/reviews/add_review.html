{% extends "base.html" %}

{% block content %}
<h2>Add Review for {{ product.name }}</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-dark">
        Submit Review
    </button>
</form>

<a href="{% url 'products:product_detail' product.id %}">
    Cancel
</a>
{% endblock %}
