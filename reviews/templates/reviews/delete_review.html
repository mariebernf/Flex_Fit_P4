{% extends "base.html" %}

{% block title %}Delete Review{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Delete Review</h2>

    <p>Are you sure you want to delete your review?</p>

    <p><strong>{{ review.comment }}</strong></p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            Yes, Delete
        </button>

        <a href="{% url 'products:product_detail' review.product.id %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
